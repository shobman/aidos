name: AIDOS Branch Lifecycle

# Maintains the rolling `aidos -> default branch` PR, resets `aidos` after a
# merge, and syncs `aidos` with the default branch when default advances.
# Install one copy of this file per repo. The connector pushes all artifact
# saves to `aidos`; this workflow handles everything downstream.
#
# Branch names and default-branch lookup:
#   - The `aidos` branch name is a fixed convention in v1.2.0+. Customising it
#     is not supported (would require edits in multiple places that GitHub
#     Actions forbids parameterising — see note on env context below).
#   - The "target" branch is the repo's default branch, discovered at runtime
#     via github.event.repository.default_branch. Works transparently for
#     repos using main, master, develop, trunk, etc.
#
# Why `if:` literals are hardcoded and not driven by an env/vars reference:
# GitHub Actions does NOT populate the env context at jobs.<job_id>.if scope
# (only at step-level and below). A reference like env.STAGING_BRANCH in an
# if: block silently resolves to "" and the job never fires. See
# https://docs.github.com/en/actions/learn-github-actions/contexts#context-availability

on:
  push:
    branches:
      - aidos
      # Common default-branch names — the sync-aidos-from-default job no-ops
      # for any push whose ref doesn't match the repo's actual default branch
      # (resolved at runtime). Add your repo's default branch name here if it
      # isn't one of these.
      - main
      - master
      - develop
      - trunk
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  ensure-rolling-pr:
    # Fires on push to the aidos branch. Opens the rolling PR if one doesn't
    # already exist and aidos is ahead of the default branch.
    if: github.event_name == 'push' && github.ref == 'refs/heads/aidos'
    runs-on: ubuntu-latest
    steps:
      - name: Ensure rolling PR exists
        uses: actions/github-script@v7
        with:
          script: |
            const target = context.payload.repository.default_branch;
            const staging = "aidos";

            const existing = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              head: `${context.repo.owner}:${staging}`,
              base: target,
              per_page: 5,
            });

            if (existing.data.length > 0) {
              core.info(`Rolling PR #${existing.data[0].number} already exists — no-op.`);
              return;
            }

            // Skip when staging has no commits ahead of target — e.g. right after
            // reset-aidos-on-merge force-resets aidos to target's tip.
            const cmp = await github.rest.repos.compareCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              base: target,
              head: staging,
            });
            if ((cmp.data.ahead_by || 0) === 0) {
              core.info(`${staging} has no commits ahead of ${target} — nothing to PR. No-op.`);
              return;
            }

            const body = [
              "**AIDOS rolling PR.** This PR accumulates `.aidos/` artifact changes that non-coders have published via the AIDOS GitHub MCP connector.",
              "",
              "Merging signals that engineering is picking up this batch for implementation. The `" + staging + "` branch will be reset to `" + target + "` automatically after merge.",
              "",
              "See the AIDOS GitHub connector README for the aidos-branch model.",
            ].join("\n");

            try {
              const pr = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head: staging,
                base: target,
                title: "AIDOS artifact updates (rolling)",
                body,
              });
              core.info(`Created rolling PR #${pr.data.number}: ${pr.data.html_url}`);
            } catch (err) {
              if (err.status === 422 && /pull request already exists/i.test(err.message || "")) {
                core.info("Race with another job — PR now exists. No-op.");
                return;
              }
              if (err.status === 422 && /no commits between/i.test(err.message || "")) {
                core.info(`${staging} drifted even with ${target} between compare and create — no-op.`);
                return;
              }
              throw err;
            }

  reset-aidos-on-merge:
    # Fires on rolling PR merge (pull_request closed & merged, head=aidos,
    # base=default_branch).
    #
    # IMPORTANT: the script below includes a precondition check comparing the
    # current aidos HEAD to the merged PR's head SHA. This is load-bearing —
    # do not strip it as redundant. Race scenario it prevents:
    #
    #   1. Connector pushes commit X to aidos.
    #   2. ensure-rolling-pr opens PR aidos@X -> default_branch.
    #   3. Maintainer merges. GitHub creates merge commit Y on default and
    #      fires the pull_request closed webhook.
    #   4. Before this job's runner starts (seconds, longer if queued), a
    #      second connector session pushes commit Z to aidos (parent: X).
    #      aidos now points at Z.
    #   5. Without the check, the unconditional force-reset would point aidos
    #      at default's tip (Y), orphaning Z. The non-coder whose session
    #      produced Z has effectively lost their work — Z survives in GH's
    #      object store ~30 days but no AIDOS workflow path leads back to it.
    #
    # With the check, we skip the reset when aidos has advanced past the
    # merged tip. The next push to aidos (already in flight or imminent)
    # triggers ensure-rolling-pr, which opens a fresh rolling PR with Z (and
    # any later commits) on top of the now-updated default branch.
    #
    # GitHub's REST API has no compare-and-swap on refs, so a microsecond
    # race remains between the getRef and updateRef calls — orders of
    # magnitude smaller than the original webhook-to-runner-start window.
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.ref == 'aidos' &&
      github.event.pull_request.base.ref == github.event.repository.default_branch
    runs-on: ubuntu-latest
    steps:
      - name: Hard-reset aidos branch to default branch tip
        uses: actions/github-script@v7
        with:
          script: |
            const target = context.payload.repository.default_branch;
            const staging = "aidos";
            const mergedHeadSha = context.payload.pull_request &&
                                  context.payload.pull_request.head &&
                                  context.payload.pull_request.head.sha;

            // Defensive: if the payload is somehow missing the merged head
            // SHA, we can't verify safely. Bail rather than risk orphaning.
            if (!mergedHeadSha) {
              core.warning(
                `pull_request.head.sha missing from payload — cannot verify ` +
                `${staging} state safely. Skipping reset; next push to ` +
                `${staging} will trigger a fresh rolling PR.`
              );
              return;
            }

            // Race guard: only reset if aidos still points at the merged tip.
            // If a connector push has advanced aidos past it, skip — the new
            // commits will form the next rolling PR.
            const currentRef = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `heads/${staging}`,
            });
            const currentSha = currentRef.data.object.sha;

            if (currentSha !== mergedHeadSha) {
              core.warning(
                `Skipping reset: ${staging} has advanced from ` +
                `${mergedHeadSha.slice(0, 7)} (the merged tip) to ` +
                `${currentSha.slice(0, 7)}. New commits on ${staging} will ` +
                `form the next rolling PR — no work is lost.`
              );
              return;
            }

            const targetRef = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `heads/${target}`,
            });
            const targetSha = targetRef.data.object.sha;

            await github.rest.git.updateRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `heads/${staging}`,
              sha: targetSha,
              force: true,
            });
            core.info(`Reset ${staging} to ${target} tip (${targetSha.slice(0, 7)}).`);

  sync-aidos-from-default:
    # Fires on push to the default branch. Creates aidos if missing; fast-forwards
    # if clean; merges default into aidos if aidos has pending saves.
    #
    # The filter below uses a step-level guard because job-level if: cannot
    # reference github.event.repository.default_branch reliably for push events
    # (github.ref carries the pushed branch; we need the repo's default to
    # compare). Gate inside the script instead.
    if: github.event_name == 'push' && github.ref != 'refs/heads/aidos'
    runs-on: ubuntu-latest
    steps:
      - name: Sync aidos with default branch
        uses: actions/github-script@v7
        with:
          script: |
            const target = context.payload.repository.default_branch;
            const staging = "aidos";

            // Only fire when the push landed on the default branch itself.
            if (context.ref !== `refs/heads/${target}`) {
              core.info(`Push was to ${context.ref}, not default (${target}) — no-op.`);
              return;
            }

            // 1. Ensure aidos exists.
            const targetRef = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `heads/${target}`,
            });
            const targetSha = targetRef.data.object.sha;

            try {
              await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${staging}`,
              });
            } catch (err) {
              if (err.status !== 404) throw err;
              core.info(`${staging} does not exist — creating from ${target}.`);
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/heads/${staging}`,
                sha: targetSha,
              });
              return;
            }

            // 2. Compare aidos to target.
            const cmp = await github.rest.repos.compareCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              base: staging,
              head: target,
            });
            const aheadOfStaging = cmp.data.ahead_by || 0;
            const stagingAhead = cmp.data.behind_by || 0;

            if (aheadOfStaging === 0) {
              core.info(`${staging} is up to date with ${target} — no-op.`);
              return;
            }

            if (stagingAhead === 0) {
              await github.rest.git.updateRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${staging}`,
                sha: targetSha,
              });
              core.info(`Fast-forwarded ${staging} to ${target}.`);
              return;
            }

            // 3. aidos has pending saves — merge target into aidos.
            try {
              const merge = await github.rest.repos.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                base: staging,
                head: target,
                commit_message: `Sync ${target} into ${staging}`,
              });
              core.info(`Merged ${target} into ${staging} (${merge.data.sha.slice(0, 7)}).`);
            } catch (err) {
              core.setFailed(`Failed to merge ${target} into ${staging}: ${err.message}. Resolve conflicts manually on ${staging}.`);
            }
